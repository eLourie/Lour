# =============================================================================
#  AI Agent — Docker Compose
#
#  Profiles:
#    mac        (default) — Ollama runs natively on the host (Metal); this
#                           compose only manages PG, Redis, Qdrant.
#    gpu-linux  — adds the Ollama container with NVIDIA passthrough.
#                 See docker-compose.gpu-linux.yml override.
#
#  Usage:
#    make up                        # mac profile (default)
#    make up PROFILE=gpu-linux      # GPU Linux
#
#  Ollama on mac is accessed via host.docker.internal:11434 (set in .env).
# =============================================================================

services:


  # PostgreSQL 16

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [mac, gpu-linux]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # init.sql creates both 'agent' and 'agent_checkpoint' databases
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  # Redis 7

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: [mac, gpu-linux]
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  # Qdrant

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    profiles: [mac, gpu-linux]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"     # HTTP / gRPC
      - "6334:6334"                      # gRPC (optional)
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
